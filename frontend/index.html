    <!-- Scramble text w/ hide button -->
    <script>
        const STATIC_CHARS = new Set(['$', ',', '.', ' ']);
        const SYMBOLS = '&%^#@!*~|+=<>?kxzqw';
        const DIGITS = '0123456789';
        const ANIMATION_DURATION = 500; // ms

        let isEncrypted = true;

        function randomScrambleChar() {
            // 2 in 3 chance of symbol, 1 in 3 chance of digit
            return Math.random() < 0.7
                ? SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]
                : DIGITS[Math.floor(Math.random() * DIGITS.length)];
        }

        function animate(el, encrypting = false) {
            const finalText = el.dataset.original || el.textContent;
            el.dataset.original = finalText;
            const steps = 20;
            const interval = ANIMATION_DURATION / steps;
            let frame = 0;

            const tick = setInterval(() => {
                frame++;
                const progress = frame / steps;
                const revealedUpTo = Math.floor(progress * finalText.length);
                let display = '';

                for (let i = 0; i < finalText.length; i++) {
                    const ch = finalText[i];
                    if (STATIC_CHARS.has(ch)) {
                        display += ch;
                    } else if (encrypting) {
                        display += i < revealedUpTo
                            ? randomScrambleChar()
                            : ch;
                    } else {
                        display += i < revealedUpTo
                            ? ch
                            : randomScrambleChar();
                    }
                }

                el.textContent = display;

                if (frame >= steps) {
                    clearInterval(tick);
                    el.textContent = encrypting
                        ? finalText.split('').map(ch => STATIC_CHARS.has(ch) ? ch : randomScrambleChar()).join('')
                        : finalText;
                }
            }, interval);
        }

        function encryptAll() {
            document.querySelectorAll('.encrypt').forEach(el => animate(el, true));
        }

        function decryptAll() {
            document.querySelectorAll('.encrypt').forEach(el => animate(el, false));
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('toggle-encrypt').addEventListener('click', () => {
                isEncrypted = !isEncrypted;
                isEncrypted ? encryptAll() : decryptAll();
            });

            // Instantly scramble on load, no animation
            document.querySelectorAll('.encrypt').forEach(el => {
                el.dataset.original = el.textContent;
                el.textContent = el.textContent.split('').map(ch =>
                    STATIC_CHARS.has(ch) ? ch : randomScrambleChar()
                ).join('');
            });
        });
    </script>

    <!-- Hide button toggle SVG -->
    <script>
        const btn = document.getElementById('toggle-encrypt');
        const [svgHide, svgShow] = btn.querySelectorAll('svg');

        svgShow.style.display = 'none';

        btn.addEventListener('click', () => {
            const isHidden = svgShow.style.display === 'none';
            svgHide.style.display = isHidden ? 'none' : '';
            svgShow.style.display = isHidden ? '' : 'none';
        });
    </script>
