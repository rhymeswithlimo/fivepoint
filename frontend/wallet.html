<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Fivepoint</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/wallet.css">

    <script defer src="js/backend.js"></script>
    <script defer src="js/guard.js"></script>
    <script defer src="js/icons.js"></script>
    <script defer src="js/scramble.js"></script>
    <script defer src="js/wallet.js"></script>
</head>
<body class="page-stack">
    <nav class="back-navigation">
        <button class="back-button" type="button" aria-label="Go back"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#0e0e0e" viewBox="0 0 256 256"><path d="M168.49,199.51a12,12,0,0,1-17,17l-80-80a12,12,0,0,1,0-17l80-80a12,12,0,0,1,17,17L97,128Z"></path></svg></button>
        <button type="button" aria-label="Wallet options"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M156,128a28,28,0,1,1-28-28A28,28,0,0,1,156,128ZM48,100a28,28,0,1,0,28,28A28,28,0,0,0,48,100Zm160,0a28,28,0,1,0,28,28A28,28,0,0,0,208,100Z"></path></svg></button>
    </nav>

    <section class="balance">
        <p class="text-muted">Your Balance is</p>
        <div class="balance-counter">
            <h1 id="balance-text">$0.00</h1>
            <button type="button" class="full-rounded" id="transferBtn">Transfer Funds</button>
        </div>
    </section>

    <section class="wallet-card-section">
        <div class="wallet-container">
            <div class="wallet-card">
                <div class="wallet-card-top">
                    <div class="wallet-card-top-icon" id="walletCardIcon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#0e0e0e" viewBox="0 0 256 256"><path d="M240,102c0,70-103.79,126.66-108.21,129a8,8,0,0,1-7.58,0C119.79,228.66,16,172,16,102A62.07,62.07,0,0,1,78,40c20.65,0,38.73,8.88,50,23.89C139.27,48.88,157.35,40,178,40A62.07,62.07,0,0,1,240,102Z"></path></svg>
                    </div>
                    <button type="button" class="wallet-card-copy-address monospace unselectable hidden" id="walletCardAddress" aria-label="Copy address"><span id="walletCardAddressText"></span><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#0e0e0e" viewBox="0 0 256 256"><path d="M216,32H88a8,8,0,0,0-8,8V80H40a8,8,0,0,0-8,8V216a8,8,0,0,0,8,8H168a8,8,0,0,0,8-8V176h40a8,8,0,0,0,8-8V40A8,8,0,0,0,216,32ZM160,208H48V96H160Zm48-48H176V88a8,8,0,0,0-8-8H96V48H208Z"></path></svg></button>
                </div>
                <div class="wallet-card-bottom unselectable">
                    <div class="wallet-card-info">
                        <h3 id="walletCardName">Wallet</h3>
                        <p class="monospace wallet-card-balance" id="walletCardValue">$0.00</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="holdings">
        <div class="holdings-header">
            <div>
                <h2 class="section-title">Holdings</h2>
                <p class="monospace unselectable" id="holdingsChange">—</p>
            </div>
            <div class="switcher">
                <div class="switcher-slider"></div>
                <button type="button" class="switcher-btn active monospace" data-period="1d">1d</button>
                <button type="button" class="switcher-btn monospace" data-period="1w">1w</button>
                <button type="button" class="switcher-btn monospace" data-period="1m">1m</button>
                <button type="button" class="switcher-btn monospace" data-period="1y">1y</button>
            </div>
        </div>
        <div class="holdings-assets" id="holdingsAssets"></div>
    </section>

    <section class="history">
        <h2 class="section-title">Latest Transactions</h2>
        <div class="transactions-container" id="transactionsContainer">
            <p class="text-muted monospace">Transaction history is coming soon.</p>
        </div>
    </section>
</body>
</html>
