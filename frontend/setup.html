<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Fivepoint</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/setup.css">

    <script defer src="js/backend.js"></script>
    <script defer src="js/icons.js"></script>
    <script defer src="js/guard.js"></script>
    <script defer src="js/setup.js"></script>
</head>
<body>

    <!-- LANDING -->
    <section class="landing">
        <div class="landing-logo">
            <svg xmlns="http://www.w3.org/2000/svg" data-name="LOGO" viewBox="0 0 1502.09 2160" aria-label="Fivepoint">
                <g data-name="EMBLEM">
                    <g data-name="BOTTOM">
                    <circle cx="370.22" cy="1805.82" r="335.49"/>
                    </g>
                    <g data-name="MIDDLE">
                    <circle cx="370.22" cy="1080" r="335.49"/>
                    <circle cx="1131.87" cy="1080" r="335.49"/>
                    </g>
                    <g data-name="TOP">
                    <circle cx="370.22" cy="354.18" r="335.49"/>
                    <circle cx="1131.87" cy="354.18" r="335.49"/>
                    </g>
                </g>
            </svg>
        </div>
        <div class="landing-options bracket-buttons">
            <button type="button" class="text-muted" id="createWalletBtn">[create a new wallet]</button>
            <button type="button" class="text-muted" id="importWalletBtn">[import an existing wallet]</button>
        </div>
    </section>

    <!-- CREATE WALLET FORM -->
    <form id="createForm" class="setup-form hidden">

        <div class="form-question">
            <label for="wname" class="unselectable form-question-label">1. Name Your Wallet</label>
            <input type="text" id="wname" name="wname" placeholder="e.g. 'Rainy Day'" autocomplete="off" class="form-text-input">
        </div>

        <div class="form-question">
            <p class="unselectable form-question-label">2. Choose an Icon for Your Wallet</p>
            <div class="icon-selector bracket-buttons">
                <div class="icon-stepper">
                    <button type="button" class="icon-nav-btn" aria-label="Previous icon">&lt;</button>
                    <div class="icon-selector-svg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 256 256">
                            <path d="M128,16a96.11,96.11,0,0,0-96,96c0,24,12.56,55.06,33.61,83,21.18,28.15,44.5,45,62.39,45s41.21-16.81,62.39-45c21.05-28,33.61-59,33.61-83A96.11,96.11,0,0,0,128,16ZM64,116a12,12,0,0,1,12-12,36,36,0,0,1,36,36,12,12,0,0,1-12,12A36,36,0,0,1,64,116Zm80,84H112a8,8,0,0,1,0-16h32a8,8,0,0,1,0,16Zm12-48a12,12,0,0,1-12-12,36,36,0,0,1,36-36,12,12,0,0,1,12,12A36,36,0,0,1,156,152Z"/>
                        </svg>
                    </div>
                    <button type="button" class="icon-nav-btn" aria-label="Next icon">&gt;</button>
                </div>
                <p class="icon-name"><i>alien</i></p>
            </div>
        </div>

        <div class="form-question">
            <p class="unselectable form-question-label">3. Choose a Color for Your Wallet</p>
            <div class="color-picker">
                <input type="radio" name="color" id="magenta" value="magenta" checked>
                <label for="magenta" class="swatch swatch-magenta"></label>

                <input type="radio" name="color" id="lime" value="lime">
                <label for="lime" class="swatch swatch-lime"></label>

                <input type="radio" name="color" id="orange" value="orange">
                <label for="orange" class="swatch swatch-orange"></label>

                <input type="radio" name="color" id="silver" value="silver">
                <label for="silver" class="swatch swatch-silver"></label>
            </div>
        </div>

        <p class="form-error hidden" id="createError"></p>

        <div class="bracket-buttons" id="formControls">
            <button type="button" class="text-muted" id="cancelBtn">[cancel]</button>
            <button type="button" class="text-muted hidden" id="backBtn">[back]</button>
            <button type="button" class="text-muted" id="continueBtn">[continue]</button>
        </div>

    </form>

    <!-- IMPORT WALLET FORM -->
    <form id="importForm" class="setup-form hidden">

        <div class="form-question active">
            <label for="iname" class="unselectable form-question-label">Name Your Wallet</label>
            <input type="text" id="iname" placeholder="e.g. 'Rainy Day'" autocomplete="off" class="form-text-input">
        </div>

        <div class="bracket-buttons import-type">
            <button type="button" class="text-muted" id="typeSeed">[seed phrase]</button>
            <button type="button" class="text-muted" id="typeKey">[private key]</button>
        </div>

        <div class="form-question active">
            <label for="isecret" class="unselectable form-question-label" id="secretLabel">Recovery Seed Phrase</label>
            <textarea id="isecret" class="form-text-input" placeholder="word1 word2 word3 ..." autocomplete="off" spellcheck="false"></textarea>
        </div>

        <div class="form-question active" id="importColorQuestion">
            <p class="unselectable form-question-label">Choose a Color</p>
            <div class="color-picker">
                <input type="radio" name="color" id="imagenta" value="magenta" checked>
                <label for="imagenta" class="swatch swatch-magenta"></label>

                <input type="radio" name="color" id="ilime" value="lime">
                <label for="ilime" class="swatch swatch-lime"></label>

                <input type="radio" name="color" id="iorange" value="orange">
                <label for="iorange" class="swatch swatch-orange"></label>

                <input type="radio" name="color" id="isilver" value="silver">
                <label for="isilver" class="swatch swatch-silver"></label>
            </div>
        </div>

        <p class="form-error hidden" id="importError"></p>

        <div class="bracket-buttons">
            <button type="button" class="text-muted" id="importCancelBtn">[cancel]</button>
            <button type="button" class="text-muted" id="importSubmitBtn">[import]</button>
        </div>

    </form>

    <!-- SEED BACKUP -->
    <section class="seed-backup hidden" id="seedBackup">
        <p class="form-question-label unselectable">Back Up Your Recovery Phrase</p>
        <p class="seed-warning unselectable">Write these words down in order and keep them offline. Anyone with this phrase controls your funds. Fivepoint cannot recover it for you.</p>
        <div class="seed-grid" id="seedGrid"></div>
        <div class="bracket-buttons">
            <button type="button" class="text-muted" id="copySeedBtn">[copy]</button>
            <button type="button" class="text-muted" id="seedDoneBtn">[i've saved it &rarr;]</button>
        </div>
    </section>
</body>
</html>
