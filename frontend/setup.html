    <!-- Wallet icons fetch script -->
    <script>
        // wallet-icons.js
        // Fetches wallet-icons.txt, parses "name = <svg>...</svg>" entries,
        // sorts them alphabetically by name, and wires up the < / > buttons
        // in the icon selector to cycle through them.

        (function () {
            const ICONS_PATH = 'assets/wallet-icons.txt';

            /**
             * Parses the raw text file into an array of { name, svg } objects.
             * Entries are separated by blank lines, each line formatted as:
             *   name = <svg ...>...</svg>
             */
            function parseIcons(text) {
                return text
                    .split(/\n\s*\n/) // split on blank lines between entries
                    .map((block) => block.trim())
                    .filter(Boolean)
                    .map((block) => {
                        const eqIndex = block.indexOf('=');
                        if (eqIndex === -1) return null;

                        const name = block.slice(0, eqIndex).trim();
                        const svg = block.slice(eqIndex + 1).trim();

                        if (!name || !svg) return null;
                        return { name, svg };
                    })
                    .filter(Boolean);
            }

            function sortIconsAlphabetically(icons) {
                return [...icons].sort((a, b) =>
                    a.name.localeCompare(b.name, undefined, { sensitivity: 'base' })
                );
            }

            function initIconSelector(icons) {
                const selector = document.querySelector('.icon-selector');
                if (!selector) return;

                const svgSlot = selector.querySelector('.icon-selector-svg');
                const nameLabel = selector.querySelector('p');
                const [prevBtn, nextBtn] = selector.querySelectorAll('button');

                if (!svgSlot || !nameLabel || !prevBtn || !nextBtn) return;

                // Let screen readers announce icon changes as the user cycles.
                nameLabel.setAttribute('aria-live', 'polite');

                let currentIndex = 0;

                function render() {
                    const icon = icons[currentIndex];
                    svgSlot.innerHTML = icon.svg;
                    nameLabel.innerHTML = `<i>${icon.name}</i>`;
                }

                function goTo(delta) {
                    currentIndex = (currentIndex + delta + icons.length) % icons.length;
                    render();
                }

                prevBtn.addEventListener('click', () => goTo(-1));
                nextBtn.addEventListener('click', () => goTo(1));

                render();
            }

            async function loadIcons() {
                let response;
                try {
                    response = await fetch(ICONS_PATH);
                } catch (err) {
                    console.error('Failed to fetch wallet-icons.txt. Note: this requires the page be served over http(s), not opened directly as a file.', err);
                    return;
                }

                if (!response.ok) {
                    console.error(`Failed to load wallet-icons.txt: ${response.status} ${response.statusText}`);
                    return;
                }

                const text = await response.text();
                const icons = sortIconsAlphabetically(parseIcons(text));

                if (icons.length === 0) {
                    console.error('No icons parsed from wallet-icons.txt.');
                    return;
                }

                initIconSelector(icons);
            }

            document.addEventListener('DOMContentLoaded', loadIcons);
        })();
    </script>
