<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accept Request to Tom - Fivepoint</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="request-styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <section class="request">
        <h2>Confirm transaction to Tom</h2>
        <div class="request-info">
            <div>
                <p>Total Value</p>
                <p>$781</p>
            </div>
            <div>
                <p>Send BTC</p>
                <p>0.012</p>
            </div>
            <div>
                <p>From</p>
                <p class="wallet-tag"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#0e0e0e" viewBox="0 0 256 256"><path d="M240,102c0,70-103.79,126.66-108.21,129a8,8,0,0,1-7.58,0C119.79,228.66,16,172,16,102A62.07,62.07,0,0,1,78,40c20.65,0,38.73,8.88,50,23.89C139.27,48.88,157.35,40,178,40A62.07,62.07,0,0,1,240,102Z"></path></svg>Rainy Day</p>
            </div>
        </div>
        <hr>
        <div class="request-fees">
            <div>
               <p>$1.31</p> 
            </div>
            <div>
                <p style="color: var(--muted);">Fee Estimate</p>
                <p>~90 sec</p>
            </div>
        </div>

        <div class="caution-text unselectable">
            <p>Review the above before pressing 'Confirm'. Once made, your transaction is irreversible.</p>
        </div>
        <div class="request-confirm">
            <button class="full-rounded">Confirm 0.012 BTC ($781) sent to Tom</button>
        </div>
    </section>
</body>
</html>
